  just_audio: ^0.10.5
  fl_chart: ^1.1.1
  intl: ^0.20.2
  uuid: ^4.5.1
  permission_handler: ^11.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
