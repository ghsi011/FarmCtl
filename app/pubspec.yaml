name: farmctl
description: Smart thermostat monitoring client.
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: '>=3.8.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^3.0.3
  go_router: ^16.2.4
  freezed_annotation: ^3.1.0
  dio: ^5.9.0
  drift: ^2.28.2
  farmctl_parsing:
    path: ../packages/farmctl_parsing
  json_annotation: ^4.9.0
