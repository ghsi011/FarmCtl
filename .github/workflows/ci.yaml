name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  build:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Show Flutter version
        run: flutter --version
        working-directory: app

      - name: Install dependencies
        run: flutter pub get
        working-directory: app

      - name: Generate code (build_runner)
        run: flutter pub run build_runner build --delete-conflicting-outputs
        working-directory: app

      - name: Verify formatting
        run: dart format --output=none --set-exit-if-changed .
        working-directory: app

      - name: Analyze
        run: flutter analyze
        working-directory: app

      - name: Install Dart package dependencies
        run: dart pub get
        working-directory: packages/farmctl_parsing

      - name: Run Dart unit tests
        working-directory: packages/farmctl_parsing
        run: dart test

      - name: Run Flutter tests
        run: flutter test
        working-directory: app

      - name: Assemble debug APK
        run: flutter build apk --debug
        working-directory: app

      - name: Assemble release APK
        if: github.ref == 'refs/heads/master'
        run: flutter build apk --release
        working-directory: app

      - name: Create GitHub release
        if: github.ref == 'refs/heads/master'
        id: create_release
        uses: actions/create-release@v1
        with:
          tag_name: release-${{ github.run_number }}
          release_name: FarmCtl Release ${{ github.run_number }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload release APK asset
        if: github.ref == 'refs/heads/master'
        uses: actions/upload-release-asset@v1
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: app/build/app/outputs/flutter-apk/app-release.apk
          asset_name: farmctl-release-${{ github.run_number }}.apk
          asset_content_type: application/vnd.android.package-archive
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
