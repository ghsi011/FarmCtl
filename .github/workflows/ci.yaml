name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Show Flutter version
        run: flutter --version
        working-directory: app

      - name: Install dependencies
        run: flutter pub get
        working-directory: app

      - name: Generate code (build_runner)
        run: dart run build_runner build --delete-conflicting-outputs
        working-directory: app

      - name: Verify formatting
        run: dart format --output=none --set-exit-if-changed .
        working-directory: app

      - name: Analyze
        run: flutter analyze
        working-directory: app

      - name: Install Dart package dependencies
        run: dart pub get
        working-directory: packages/farmctl_parsing

      - name: Run Dart unit tests with coverage
        run: |
          dart test --coverage=coverage
          dart run coverage:format_coverage --lcov --in=coverage --out=coverage/lcov.info --report-on=lib
        working-directory: packages/farmctl_parsing

      # The parsing package holds the safety-critical temperature parser; keep it
      # near-fully covered.
      - name: Enforce parsing coverage threshold
        run: bash tool/check_coverage.sh 85 packages/farmctl_parsing/coverage/lcov.info

      - name: Run Flutter tests with coverage
        run: flutter test --coverage
        working-directory: app

      # Floor / regression guard (hand-written code only; generated *.g.dart /
      # *.freezed.dart are excluded). Ratcheted up as coverage improves.
      - name: Enforce coverage threshold
        run: bash tool/check_coverage.sh 45

      - name: Assemble debug APK
        run: flutter build apk --debug
        working-directory: app
